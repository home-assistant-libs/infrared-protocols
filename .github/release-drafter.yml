name-template: "$RESOLVED_VERSION"
tag-template: "$RESOLVED_VERSION"
change-template: "- #$NUMBER $TITLE @$AUTHOR"
sort-direction: ascending

categories:
  - title: "🚨 Breaking changes"
    labels: ["breaking-change"]
  - title: "✨ New features"
    labels: ["new-feature"]
  - title: "🐛 Bug fixes"
    labels: ["bugfix"]
  - title: "🚀 Enhancements"
    labels: ["enhancement"]
  - title: "🧰 Maintenance"
    labels: ["maintenance", "ci"]
  - title: "📚 Documentation"
    labels: ["documentation"]
  - title: "⬆️ Dependency updates"
    collapse-after: 5
    labels: ["dependencies"]

version-resolver:
  major:
    labels: ["major", "breaking-change"]
  minor:
    labels: ["minor", "new-feature"]
  patch:
    labels:
      - "bugfix"
      - "ci"
      - "dependencies"
      - "documentation"
      - "enhancement"
      - "maintenance"
  default: patch

template: |
  ## What's changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...$RESOLVED_VERSION
