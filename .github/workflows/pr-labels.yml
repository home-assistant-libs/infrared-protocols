name: Verify PR labels

on:
  pull_request:
    types:
      - opened
      - synchronize
      - labeled
      - unlabeled
    branches:
      - main

jobs:
  verify:
    name: Verify PR labels
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR has a valid label
        uses: ludeeus/action-require-labels@2.0.0
        with:
          labels: >-
            breaking-change, bugfix, ci, dependencies, documentation,
            enhancement, maintenance, major, minor, new-feature
